<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 200" width="1080" height="200" role="img" aria-label="SimRaceWatch">
  <style>
    .word {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-weight: 800;
      letter-spacing: -3px;
    }
    .base { fill: #fafafa; }
    .accent { fill: #d13a2c; }
    @media (prefers-color-scheme: light) {
      .base { fill: #1a1815; }
    }
  </style>
  <text x="0" y="150" class="word" font-size="150" textLength="1070" lengthAdjust="spacingAndGlyphs">
    <tspan class="base">SimRace</tspan><tspan class="accent">Watch</tspan>
  </text>
</svg>
