<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="600" height="150" role="img" aria-label="TabletopWatch">
  <style>
    .word {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-weight: 800;
      letter-spacing: -2px;
    }
    .base { fill: #1a1815; }
    .accent { fill: #3a9a9a; }
    @media (prefers-color-scheme: dark) {
      .base { fill: #fafafa; }
    }
  </style>
  <text x="0" y="108" class="word" font-size="110">
    <tspan class="base">Tabletop</tspan><tspan class="accent">Watch</tspan>
  </text>
</svg>
